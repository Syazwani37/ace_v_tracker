<div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-200 mt-10">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Log New Industrial Visit</h2>
    <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Employer/Company</label>
            <input type="text" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="Search company...">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Scheduled Date</label>
            <input type="date" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Visit Objective</label>
            <textarea class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                rows="3"></textarea>
        </div>
        <div class="flex justify-end space-x-4 md:col-span-2 mt-4">
            <button type="button" class="px-6 py-2 text-gray-600 font-medium">Cancel</button>
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">Save
                Visit</button>
        </div>
    </form>
</div>
