<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Company Database</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCompanyModal">+ Add Company</button>
    </div>

    <div class="card p-3 mb-4">
        <form class="row g-3">
            <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Search Company Name...">
            </div>
            <div class="col-md-3">
                <select class="form-select">
                    <option selected>All Industries</option>
                    <option>Manufacturing</option>
                    <option>IT/Tech</option>
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-secondary w-100">Filter</button>
            </div>
        </form>
    </div>

    <table class="table table-hover border bg-white">
        <thead>
            <tr>
                <th>Company Name</th>
                <th>Industry</th>
                <th>Location</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Tesla Motors</td>
                <td>Automotive</td>
                <td>Selangor</td>
                <td><span class="badge bg-success">Active Partner</span></td>
                <td>
                    <button class="btn btn-sm btn-light">Edit</button>
                    <button class="btn btn-sm btn-light text-danger">Archive</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
